<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Fitness Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 150, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 255, 150, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff9e, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .date {
            font-size: 0.9rem;
            color: #888;
        }

        .section {
            margin-bottom: 35px;
            padding: 25px;
            background: rgba(50, 50, 50, 0.6);
            border-radius: 15px;
            border-left: 4px solid #00ff9e;
            transition: all 0.3s ease;
        }

        .section:hover {
            background: rgba(50, 50, 50, 0.8);
            border-left-color: #00b8ff;
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00ff9e;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Water Tracker Section */
        .water-tracker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .water-counter {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 255, 150, 0.1), rgba(0, 184, 255, 0.1));
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 150, 0.3);
            min-width: 200px;
        }

        .water-counter p {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .water-amount {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff9e, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .water-amount small {
            font-size: 1rem;
            color: #888;
            margin-left: 5px;
        }

        .btn-water {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #00ff9e, #00b8ff);
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 255, 150, 0.3);
        }

        .btn-water:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 150, 0.5);
        }

        .btn-water:active {
            transform: translateY(-1px);
        }

        /* Workout Habits Section */
        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .habit-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 150, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .habit-item:hover {
            border-color: rgba(0, 184, 255, 0.5);
            background: rgba(50, 50, 50, 0.8);
        }

        .habit-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #00ff9e;
            margin-right: 15px;
        }

        .habit-item label {
            flex: 1;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
        }

        .habit-item input[type="checkbox"]:checked + label {
            color: #00ff9e;
            text-decoration: line-through;
        }

        /* Reset Button */
        .btn-reset {
            width: 100%;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff006e, #ff3300);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.3);
            margin-top: 10px;
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 0, 110, 0.5);
        }

        .btn-reset:active {
            transform: translateY(-1px);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .section {
                padding: 20px;
                margin-bottom: 25px;
            }

            .section h2 {
                font-size: 1.1rem;
            }

            .water-amount {
                font-size: 2.5rem;
            }

            .btn-water,
            .btn-reset {
                padding: 12px;
                font-size: 1rem;
            }

            .habit-item {
                padding: 12px;
            }

            .habit-item input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
        }

        @media (max-width: 320px) {
            h1 {
                font-size: 1.5rem;
            }

            .water-amount {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 Fitness Tracker</h1>
            <p class="date" id="today-date"></p>
        </header>

        <!-- Water Tracker Section -->
        <section class="section water-tracker">
            <h2>💧 Water Tracker</h2>
            <div class="water-counter">
                <p>Water Consumed Today</p>
                <div class="water-amount">
                    <span id="water-count">0</span><small>ml</small>
                </div>
            </div>
            <button class="btn-water" onclick="addWater()">+250ml</button>
        </section>

        <!-- Workout Complete Section -->
        <section class="section">
            <h2>🎯 Daily Habits</h2>
            <div class="habit-list">
                <div class="habit-item">
                    <input type="checkbox" id="lifted" onchange="updateHabits()">
                    <label for="lifted">Lifted Weights</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox" id="cardio" onchange="updateHabits()">
                    <label for="cardio">Hit Cardio</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox" id="stretched" onchange="updateHabits()">
                    <label for="stretched">Stretched</label>
                </div>
            </div>
        </section>

        <!-- Reset Button -->
        <button class="btn-reset" onclick="resetDaily()">🔄 Reset Daily Stats</button>
    </div>

    <script>
        // Initialize the app
        function initApp() {
            loadData();
            updateDate();
        }

        // Update today's date
        function updateDate() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('today-date').textContent = today.toLocaleDateString('en-US', options);
        }

        // Add 250ml water
        function addWater() {
            let waterCount = parseInt(document.getElementById('water-count').textContent);
            waterCount += 250;
            document.getElementById('water-count').textContent = waterCount;
            saveData();
        }

        // Update habits (for future enhancements like tracking)
        function updateHabits() {
            saveData();
        }

        // Reset daily stats
        function resetDaily() {
            if (confirm('Are you sure you want to reset today\'s stats? 🔄')) {
                // Reset water
                document.getElementById('water-count').textContent = '0';

                // Uncheck all habits
                document.getElementById('lifted').checked = false;
                document.getElementById('cardio').checked = false;
                document.getElementById('stretched').checked = false;

                // Clear saved data
                localStorage.removeItem('fitnessTrackerData');
                saveData();
            }
        }

        // Save data to localStorage
        function saveData() {
            const data = {
                water: parseInt(document.getElementById('water-count').textContent),
                lifted: document.getElementById('lifted').checked,
                cardio: document.getElementById('cardio').checked,
                stretched: document.getElementById('stretched').checked,
                date: new Date().toDateString()
            };
            localStorage.setItem('fitnessTrackerData', JSON.stringify(data));
        }

        // Load data from localStorage
        function loadData() {
            const savedData = localStorage.getItem('fitnessTrackerData');
            const today = new Date().toDateString();

            if (savedData) {
                const data = JSON.parse(savedData);

                // Check if data is from today
                if (data.date === today) {
                    // Restore today's data
                    document.getElementById('water-count').textContent = data.water;
                    document.getElementById('lifted').checked = data.lifted;
                    document.getElementById('cardio').checked = data.cardio;
                    document.getElementById('stretched').checked = data.stretched;
                } else {
                    // Data is from previous day, reset everything
                    localStorage.removeItem('fitnessTrackerData');
                }
            }
        }

        // Initialize app when page loads
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
